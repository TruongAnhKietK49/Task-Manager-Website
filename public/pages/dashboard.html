<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar"></div>


<!-- MAIN -->

<div class="main">

  <h2 class="mb-4">📊 Dashboard</h2>

  <!-- STATS -->

  <div class="row g-3 mb-4">

    <div class="col-md-3">
      <div class="card stat-card">
        <h3 id="totalProjects">0</h3>
        <p>Total Projects</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card">
        <h3 id="inProgressTasks">0</h3>
        <p>In Progress</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card">
        <h3 id="doneTasks">0</h3>
        <p>Completed</p>
      </div>
    </div>

  </div>


  <!-- RECENT TASKS -->

  <div class="card">

    <div class="card-body">

      <h5 class="mb-3">📋 Recent Tasks</h5>

      <table class="table">

        <thead>
          <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Due Date</th>
          </tr>
        </thead>

        <tbody id="recentTasks"></tbody>

      </table>

    </div>

  </div>

</div>


<script src="../js/dashboard.js"></script>
<script src="../js/loadSidebar.js"></script>

</body>
</html>
